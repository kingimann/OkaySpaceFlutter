name: okayspace
description: A new Flutter project.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.0.0

dependencies:
  flutter:
    sdk: flutter
  # DOM/JS bindings for the embedded Stripe Connect forms (web only).
  web: ^1.1.0
  # Secure, persistent storage for the session token / API key.
  flutter_secure_storage: ^9.2.2
  # Pick photos for the story composer (works on web + mobile).
  image_picker: ^1.1.2
  # Inline video playback for post media and reels.
  video_player: ^2.9.2
  # Interactive map (Mapbox raster tiles).
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  qr_flutter: ^4.1.0
  file_picker: ^11.0.2
  # NFC tap-to-pay (iOS/Android; no-op on web via conditional import).
  nfc_manager: ^3.5.0
  # Biometric unlock for the wallet PIN lock (no-op on web).
  local_auth: ^2.3.0
  # Open external maps for roadside directions.
  url_launcher: ^6.3.0
  # Device GPS for the map, roadside nearby, and directions origin.
  geolocator: ^13.0.0
  # Native Stripe PaymentSheet for in-app card payments (iOS/Android).
  flutter_stripe: ^11.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
