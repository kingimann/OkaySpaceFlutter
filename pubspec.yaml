name: okayspace
description: A new Flutter project.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.0.0

dependencies:
  flutter:
    sdk: flutter
  # Networking layer for the OkaySpace REST API.
  dio: ^5.7.0
  # Secure, persistent storage for the session token / API key.
  flutter_secure_storage: ^9.2.2
  # Pick photos for the story composer (works on web + mobile).
  image_picker: ^1.1.2
  # Inline video playback for post media and reels.
  video_player: ^2.9.2
  # Interactive map (OpenStreetMap tiles, no API key needed).
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  qr_flutter: ^4.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
