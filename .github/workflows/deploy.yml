name: Deploy web to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One Pages deployment at a time. Don't cancel an in-progress production
# deploy; queued runs collapse to the latest. This avoids the "Requires
# authentication (401)" failures the legacy branch pipeline hit when
# deployments overlapped or its token went stale.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Enables Pages and switches the source to "GitHub Actions" if it isn't
      # already, so the deploy step authenticates via OIDC (no more 401s).
      - uses: actions/configure-pages@v5
        with:
          enablement: true

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.1
          channel: stable
          cache: true

      - run: flutter pub get

      - name: Compute build stamp
        run: echo "STAMP=${GITHUB_SHA::7}-$(date -u +%Y%m%d%H%M%S)" >> "$GITHUB_ENV"

      - name: Build web
        run: flutter build web --release --base-href "/OkaySpaceFlutter/" --dart-define=BUILD_STAMP="$STAMP"

      - name: Post-process (kill-switch, cache-bust, version, SPA fallback)
        run: |
          set -euo pipefail
          BUILD_DIR=build/web

          # Replace Flutter's caching service worker with a self-unregistering
          # kill-switch so deploys are always picked up immediately.
          cat > "$BUILD_DIR/flutter_service_worker.js" <<SW
          // OkaySpace cache kill-switch · build $STAMP
          self.addEventListener('install', (e) => self.skipWaiting());
          self.addEventListener('activate', (e) => {
            e.waitUntil((async () => {
              try { await self.registration.unregister(); } catch (_) {}
              try {
                const keys = await caches.keys();
                await Promise.all(keys.map((k) => caches.delete(k)));
              } catch (_) {}
              const clients = await self.clients.matchAll({ type: 'window' });
              for (const c of clients) { try { c.navigate(c.url); } catch (_) {} }
            })());
          });
          SW

          # Cache-bust the fixed-name entry scripts so the browser fetches the
          # new code every deploy.
          perl -pi -e "s/flutter_bootstrap\.js(\?v=[^\"']*)?/flutter_bootstrap.js?v=$STAMP/g" "$BUILD_DIR/index.html"
          perl -pi -e "s/main\.dart\.js(\?v=[^\"']*)?/main.dart.js?v=$STAMP/g" "$BUILD_DIR/flutter_bootstrap.js"

          # Make the HTML itself always revalidate. GitHub Pages serves
          # index.html with a ~10-min CDN cache, which can briefly serve the
          # old HTML (and old ?v= scripts) after a deploy. These meta tags tell
          # the browser never to reuse a cached HTML, so the new build (and its
          # cache-busted scripts) is picked up on the very next load.
          perl -0pi -e 's/<head>/<head>\n  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">\n  <meta http-equiv="Pragma" content="no-cache">\n  <meta http-equiv="Expires" content="0">/' "$BUILD_DIR/index.html"

          # Version manifest the running app polls to detect a new deploy.
          echo "{\"build\":\"$STAMP\"}" > "$BUILD_DIR/version.json"

          # SPA deep-link fallback + skip Jekyll.
          cp "$BUILD_DIR/index.html" "$BUILD_DIR/404.html"
          touch "$BUILD_DIR/.nojekyll"

      - uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
