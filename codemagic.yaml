# Codemagic CI/CD configuration for OkaySpace (Flutter, Android + iOS).
# Docs: https://docs.codemagic.io/yaml-quick-start/building-a-flutter-app/
#
# ── Before the iOS workflow can run, in the Codemagic UI ──────────────────
#   1. Use this codemagic.yaml (App settings > switch from "Workflow Editor"
#      to "codemagic.yaml"). This avoids the "Scheme 'Runner' not found"
#      error, which comes from the UI editor's stale scheme cache.
#   2. Add an App Store Connect API key integration:
#      Teams > Integrations > Developer Portal. Upload the .p8 + Key ID +
#      Issuer ID and NAME it to match `app_store_connect:` below.
#   3. Register bundle id `com.okayspace.okayspace` in App Store Connect and
#      create the app record, then put its numeric Apple ID in
#      `APP_STORE_APPLE_ID` below.
#   4. The app uses NFC tap-to-pay and Face ID. On the Apple Developer
#      portal, enable the "NFC Tag Reading" capability on the App ID before
#      fetching signing files — the provisioning profile must carry it to
#      match Runner/Runner.entitlements (already linked via
#      CODE_SIGN_ENTITLEMENTS). Face ID needs no capability, only the
#      NSFaceIDUsageDescription already present in Info.plist.
#   5. Android release signing: upload your keystore in Codemagic
#      (Teams > Code signing identities) under the reference name
#      `okayspace_keystore`, or builds fall back to debug signing.
# --------------------------------------------------------------------------

definitions:
  # Reused environment across workflows.
  flutter_env: &flutter_env
    flutter: 3.44.2
    java: 21
  ios_signing_env: &ios_signing_env
    flutter: 3.44.2
    xcode: latest
    cocoapods: default

workflows:
  # ───────────────────────────── iOS ──────────────────────────────────────
  ios-release:
    name: OkaySpace iOS (App Store / TestFlight)
    instance_type: mac_mini_m2          # macOS required for iOS builds
    max_build_duration: 90
    integrations:
      app_store_connect: OkaySpace ASC  # <-- name of your ASC API key integration
    environment:
      <<: *ios_signing_env
      ios_signing:
        distribution_type: app_store    # app_store | ad_hoc | development | enterprise
        bundle_identifier: com.okayspace.okayspace
      vars:
        BUNDLE_ID: "com.okayspace.okayspace"
        XCODE_WORKSPACE: "Runner.xcworkspace"
        XCODE_SCHEME: "Runner"
        APP_STORE_APPLE_ID: 0000000000  # <-- numeric Apple ID of the app record
    cache:
      cache_paths:
        - $HOME/.pub-cache
        - $HOME/Library/Caches/CocoaPods
        - ios/Pods
    scripts:
      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
          xcode-project use-profiles
      - name: Get Flutter packages
        script: flutter pub get
      - name: Install CocoaPods dependencies
        script: |
          find . -name "Podfile" -execdir pod install \;
      - name: Flutter analyze
        script: flutter analyze
      - name: Flutter test
        script: flutter test
      - name: Set build number
        script: |
          # Auto-increment the iOS build number from the latest TestFlight build.
          LATEST=$(app-store-connect get-latest-testflight-build-number "$APP_STORE_APPLE_ID" 2>/dev/null || echo 0)
          flutter build ipa --release \
            --build-number=$(($LATEST + 1)) \
            --dart-define=MAPBOX_TOKEN="${MAPBOX_TOKEN:-}" \
            --dart-define=STRIPE_TOPUP_LINK="${STRIPE_TOPUP_LINK:-}" \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - flutter_drive.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        # submit_to_app_store: false   # set true to push to App Store review
        # beta_groups:
        #   - App Store Connect Users
      email:
        recipients:
          - ifakhargomi@gmail.com
        notify:
          success: true
          failure: true

  # iOS build with no signing — fast PR / smoke check (no Apple account needed).
  ios-debug:
    name: OkaySpace iOS (unsigned smoke build)
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      <<: *ios_signing_env
      vars:
        XCODE_WORKSPACE: "Runner.xcworkspace"
        XCODE_SCHEME: "Runner"
    cache:
      cache_paths:
        - $HOME/.pub-cache
        - $HOME/Library/Caches/CocoaPods
        - ios/Pods
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Install CocoaPods dependencies
        script: find . -name "Podfile" -execdir pod install \;
      - name: Flutter analyze
        script: flutter analyze
      - name: Flutter test
        script: flutter test
      - name: Build unsigned iOS app
        script: flutter build ios --release --no-codesign
    artifacts:
      - build/ios/iphoneos/*.app
      - /tmp/xcodebuild_logs/*.log

  # ───────────────────────────── Android ──────────────────────────────────
  android-release:
    name: OkaySpace Android
    instance_type: linux_x2
    max_build_duration: 60
    environment:
      <<: *flutter_env
      android_signing:
        # Upload the keystore under this reference name in Codemagic
        # (Teams > Code signing identities). Remove this block to build
        # with debug signing instead.
        - okayspace_keystore
    cache:
      cache_paths:
        - $HOME/.pub-cache
        - $HOME/.gradle/caches
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Flutter analyze
        script: flutter analyze
      - name: Flutter test
        script: flutter test
      - name: Build release APK + App Bundle
        script: |
          BUILD_STAMP="${CM_COMMIT:0:7}-$(date -u +%Y%m%d%H%M%S)"
          flutter build apk --release \
            --dart-define=BUILD_STAMP="$BUILD_STAMP" \
            --dart-define=MAPBOX_TOKEN="${MAPBOX_TOKEN:-}" \
            --dart-define=STRIPE_TOPUP_LINK="${STRIPE_TOPUP_LINK:-}"
          flutter build appbundle --release \
            --dart-define=BUILD_STAMP="$BUILD_STAMP" \
            --dart-define=MAPBOX_TOKEN="${MAPBOX_TOKEN:-}" \
            --dart-define=STRIPE_TOPUP_LINK="${STRIPE_TOPUP_LINK:-}"
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
      - build/app/outputs/bundle/release/*.aab
    publishing:
      email:
        recipients:
          - ifakhargomi@gmail.com
        notify:
          success: true
          failure: true

  # ───────────────────────────── Web ──────────────────────────────────────
  # Builds the deployable web bundle (the live site itself deploys via the
  # GitHub Actions workflow on pushes to main; this artifact is for manual
  # hosting or verification).
  web-release:
    name: OkaySpace Web
    instance_type: linux_x2
    max_build_duration: 30
    environment:
      <<: *flutter_env
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
      cancel_previous_builds: true
    cache:
      cache_paths:
        - $HOME/.pub-cache
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Flutter analyze
        script: flutter analyze
      - name: Flutter test
        script: flutter test
      - name: Build web (release)
        script: |
          # BUILD_STAMP drives the in-app "new version available" prompt.
          BUILD_STAMP="${CM_COMMIT:0:7}-$(date -u +%Y%m%d%H%M%S)"
          # Set MAPBOX_TOKEN as a Codemagic env var to enable Mapbox tiles.
          flutter build web --release \
            --base-href "/OkaySpaceFlutter/" \
            --dart-define=BUILD_STAMP="$BUILD_STAMP" \
            --dart-define=MAPBOX_TOKEN="${MAPBOX_TOKEN:-}" \
            --dart-define=STRIPE_TOPUP_LINK="${STRIPE_TOPUP_LINK:-}"
          cd build && zip -r web.zip web
    artifacts:
      - build/web.zip
    publishing:
      email:
        recipients:
          - ifakhargomi@gmail.com
        notify:
          success: false
          failure: true
